    <link rel="icon" type="image/png" href="images/icon.png">

    <link rel="stylesheet" href="style.css">
    <style>
        .contact-container {
            max-width: 700px;
            margin: 40px auto;
            background: var(--surface);
            border: 3px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
        }
        .contact-container h1 {
            font-family: var(--font);
            font-size: 1.2rem;
            color: var(--yellow);
            margin-bottom: 20px;
        }
        .contact-methods {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 30px 0;
        }
        .contact-card {
            background: var(--bg2);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s;
        }
        .contact-card:hover {
            transform: translateY(-4px);
            border-color: var(--cyan);
        }
        .contact-card i {
            font-size: 2rem;
            color: var(--cyan);
            margin-bottom: 10px;
        }
        .contact-card h3 {
            font-family: var(--font);
            font-size: 0.65rem;
            margin-bottom: 8px;
        }
        .contact-card p, .contact-card a {
            font-size: 0.5rem;
            color: var(--text-dim);
            text-decoration: none;
        }
        .contact-card a:hover {
            color: var(--yellow);
        }
        .back-home {
            display: inline-block;
            margin-top: 20px;
            font-family: var(--font);
            font-size: 0.55rem;
            background: var(--purple);
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            color: #fff;
        }
        .back-home:hover { background: var(--cyan); }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="site-wrapper" style="padding: 20px;">

            <div class="contact-methods">
                <div class="contact-card">
                    <i class="fa-solid fa-envelope"></i>
                    <h3>البريد الإلكتروني</h3>

                    <p>نرد عادة خلال 24-48 ساعة</p>

            <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-right"></i> العودة إلى الصفحة الرئيسية</a>
        </div>
        <footer class="site-footer">

            <p class="footer-sub">صُنع بـ ❤️ لمحبي ألعاب الطفولة</p>

    </div>
</body>
